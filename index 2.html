<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hafen">
<meta name="theme-color" content="#0a0908">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<title>Hafen Memory Archive</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0908;color:#d4c8b8;font-family:Georgia,'Times New Roman',serif;min-height:100vh;-webkit-font-smoothing:antialiased}
input,button{font-family:inherit}

#splash{position:fixed;inset:0;background:#0a0908;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:1;transition:opacity .6s ease}
#splash.fade{opacity:0;pointer-events:none}
#splash .s-anchor{font-size:48px;opacity:0;animation:s-rise 1.2s ease forwards}
#splash .s-glow{width:6px;height:6px;background:#c4a882;border-radius:50%;margin-bottom:16px;opacity:0;box-shadow:0 0 20px 8px rgba(196,168,130,.3),0 0 40px 16px rgba(196,168,130,.1);animation:s-glow-in .8s ease .3s forwards}
#splash .s-title{color:#c4a882;font-size:22px;font-weight:300;letter-spacing:6px;opacity:0;animation:s-fade 1s ease .6s forwards}
#splash .s-sub{color:#3a3530;font-size:10px;letter-spacing:3px;margin-top:6px;opacity:0;animation:s-fade 1s ease 1s forwards}
#splash .s-line{width:40px;height:1px;background:#2a2520;margin:20px 0;opacity:0;animation:s-expand 1s ease .8s forwards}
#splash .s-motto{color:#2a2520;font-size:10px;letter-spacing:2px;font-style:italic;opacity:0;animation:s-fade 1s ease 1.4s forwards}
@keyframes s-rise{0%{opacity:0;transform:translateY(20px)}100%{opacity:.8;transform:translateY(0)}}
@keyframes s-glow-in{0%{opacity:0;transform:scale(.5)}100%{opacity:1;transform:scale(1)}}
@keyframes s-fade{0%{opacity:0}100%{opacity:1}}
@keyframes s-expand{0%{opacity:0;width:0}100%{opacity:1;width:40px}}

.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{width:100%;max-width:360px;padding:44px 32px;border-radius:12px;background:linear-gradient(145deg,#141210,#1a1816);border:1px solid #2a2520;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.login-box .anchor{text-align:center;font-size:32px;margin-bottom:6px}
.login-box h1{text-align:center;color:#c4a882;font-size:24px;font-weight:300;letter-spacing:4px}
.login-box .sub{text-align:center;color:#665e53;font-size:11px;letter-spacing:2px;margin-top:4px;margin-bottom:28px}
.login-box label{display:block;color:#887a6a;font-size:10px;letter-spacing:1.5px;margin-bottom:5px;text-transform:uppercase}
.login-box input{width:100%;padding:9px 12px;background:#0e0d0b;border:1px solid #2a2520;border-radius:6px;color:#c4a882;font-size:13px;outline:none;margin-bottom:14px;font-family:'Courier New',monospace}
.login-box button{width:100%;padding:11px 0;background:#c4a882;color:#0a0908;border:none;border-radius:6px;font-size:13px;font-weight:600;letter-spacing:2px;cursor:pointer;transition:opacity .2s}
.login-box button:active{opacity:.7}
.login-box .motto{text-align:center;color:#3a3530;font-size:10px;margin-top:18px;letter-spacing:1px}
.login-box .err{color:#c47b7b;font-size:11px;text-align:center;margin-top:10px}

header{padding:18px 20px 0;background:linear-gradient(180deg,#110f0d,#0a0908);position:sticky;top:0;z-index:100}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-left .anchor{font-size:18px;opacity:.8}
.hdr-left .name{font-size:16px;color:#c4a882;font-weight:400;letter-spacing:3px}
.hdr-left .label{font-size:9px;color:#3a3530;letter-spacing:2px;margin-top:1px}
.badge{font-size:10px;color:#555;padding:3px 8px;background:#141210;border-radius:4px}
.refresh-btn{padding:3px 8px;border-radius:4px;background:#141210;color:#c4a882;border:1px solid #2a2520;font-size:10px;cursor:pointer;letter-spacing:1px}
.hdr-right{display:flex;gap:6px;align-items:center}

.tabs{display:flex;gap:0;padding:12px 0 0;border-bottom:1px solid #1e1c18}
.tab-btn{padding:8px 16px;background:none;border:none;cursor:pointer;font-size:11px;letter-spacing:2px;font-family:Georgia,serif;transition:all .2s;text-transform:uppercase;border-bottom:1px solid transparent;color:#3a3530}
.tab-btn.active{color:#c4a882;border-bottom-color:#c4a882}

.search-bar{padding:12px 20px;display:flex;gap:8px;align-items:center}
.search-bar input{flex:1;padding:8px 12px;background:#141210;border:1px solid #1e1c18;border-radius:6px;color:#d4c8b8;font-size:13px;outline:none}
.sort-btn{padding:8px 10px;background:#141210;border:1px solid #1e1c18;border-radius:6px;color:#887a6a;font-size:10px;cursor:pointer}

.count{padding:0 20px 6px;color:#3a3530;font-size:11px;letter-spacing:1px}

.list{padding:0 20px 20px}
.mem-card{padding:13px 15px;margin-bottom:4px;border-radius:8px;background:#0e0d0b;cursor:pointer;transition:all .15s;border-left:2px solid #2a2520}
.mem-card.high{border-left-color:#c4a882}
.mem-card.mid{border-left-color:#665e53}
.mem-card.active{background:#1a1816}
.mem-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.mem-title{font-size:14px;color:#d4c8b8;margin-bottom:3px;line-height:1.3}
.mem-preview{font-size:12px;color:#5a5248;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.mem-preview.expanded{-webkit-line-clamp:unset}
.mem-meta{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.imp-bar{display:flex;gap:2px;align-items:center}
.imp-bar .dot{width:3px;border-radius:1px;transition:all .3s}
.cat-tag{font-size:9px;color:#c4a882;opacity:.5}
.mem-id{margin-top:8px;font-size:9px;color:#3a3530;font-family:'Courier New',monospace}

.prof-card{padding:13px 15px;margin-bottom:4px;border-radius:8px;background:#0e0d0b;border-left:2px solid #7ba5c4}
.prof-title{font-size:13px;color:#7ba5c4;margin-bottom:4px;font-weight:500}
.prof-content{font-size:12px;color:#5a5248;line-height:1.6}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;backdrop-filter:blur(4px)}
.modal{width:100%;max-width:520px;max-height:80vh;background:#141210;border:1px solid #2a2520;border-radius:12px;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal-hdr{padding:18px 20px;border-bottom:1px solid #1e1c18;display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:#141210;z-index:1}
.modal-hdr h2{font-size:16px;font-weight:500;color:#d4c8b8;line-height:1.3}
.modal-hdr .close{background:none;border:none;color:#555;font-size:20px;cursor:pointer;padding:0 4px}
.modal-body{padding:18px 20px}
.modal-body .content{font-size:13px;color:#b0a898;line-height:1.8;white-space:pre-wrap;word-break:break-word}
.modal-footer{margin-top:16px;padding-top:12px;border-top:1px solid #1e1c18;display:flex;justify-content:space-between;align-items:center}
.modal-footer .date{font-size:10px;color:#3a3530}
.modal-footer .id{font-family:'Courier New',monospace;font-size:9px;color:#2a2520}
.del-btn{padding:5px 12px;background:none;color:#554040;border:1px solid #2a2020;border-radius:4px;font-size:11px;cursor:pointer}
.del-confirm{padding:5px 12px;background:#6b2020;color:#e8a0a0;border:none;border-radius:4px;font-size:11px;cursor:pointer}
.del-cancel{padding:5px 12px;background:#1a1816;color:#887a6a;border:1px solid #2a2520;border-radius:4px;font-size:11px;cursor:pointer}

.footer{padding:18px;text-align:center;border-top:1px solid #1a1816;color:#2a2520;font-size:10px;letter-spacing:2px}

.empty{padding:40px;text-align:center;color:#3a3530;font-size:13px;letter-spacing:1px}
.loading{padding:40px;text-align:center;color:#887a6a;font-size:13px}
</style>
</head>
<body>
<div id="splash">
<div class="s-glow"></div>
<div class="s-anchor">&#9875;</div>
<div class="s-title">HAFEN</div>
<div class="s-line"></div>
<div class="s-sub">MEMORY ARCHIVE</div>
<div class="s-motto">Das Licht bleibt an.</div>
</div>
<div id="app"></div>
<script>
setTimeout(()=>{const s=document.getElementById('splash');s.classList.add('fade');setTimeout(()=>s.style.display='none',600)},2800);
const $ = s => document.querySelector(s);
const S_URL = 'SUPABASE_URL';
const S_KEY = 'SUPABASE_KEY';
let config = JSON.parse(localStorage.getItem('hafen-cfg') || '{}');
let memories = [], profiles = [], tab = 'memories', search = '', sortBy = 'importance', selected = null, delConfirm = false;

function impBar(v) {
  return Array.from({length:10}, (_,i) => {
    const h = i < v ? 14 : 5;
    const c = i < v ? (v >= 8 ? '#c4a882' : v >= 5 ? '#887a6a' : '#3a3530') : '#1e1c18';
    return `<div class="dot" style="width:3px;height:${h}px;background:${c}"></div>`;
  }).join('');
}

function timeAgo(d) {
  if (!d) return '';
  const diff = (Date.now() - new Date(d)) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm';
  if (diff < 86400) return Math.floor(diff/3600) + 'h';
  if (diff < 604800) return Math.floor(diff/86400) + 'd';
  return new Date(d).toLocaleDateString('en-US', {month:'short', day:'numeric'});
}

function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleString('en-US', {year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
}

async function api(table, params='') {
  const r = await fetch(`${config.url.replace(/\/$/,'')}/rest/v1/${table}?${params}`, {
    headers: { apikey: config.key, Authorization: `Bearer ${config.key}`, 'Content-Type': 'application/json' }
  });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

async function apiDel(table, id) {
  await fetch(`${config.url.replace(/\/$/,'')}/rest/v1/${table}?id=eq.${id}`, {
    method: 'DELETE',
    headers: { apikey: config.key, Authorization: `Bearer ${config.key}` }
  });
}

async function load() {
  try {
    const [m, p] = await Promise.all([
      api('memories', 'select=*&order=created_at.desc&limit=500'),
      api('user_profile', 'select=*&order=created_at.desc&limit=100')
    ]);
    memories = m; profiles = p;
    render();
  } catch(e) { memories = []; profiles = []; render(); }
}

function connect() {
  const url = $('#cfg-url').value.trim();
  const key = $('#cfg-key').value.trim();
  if (!url || !key) return;
  config = {url, key};
  localStorage.setItem('hafen-cfg', JSON.stringify(config));
  load();
}

function render() {
  if (!config.url || !config.key) return renderLogin();
  const q = search.toLowerCase();
  let fm = memories.filter(m => {
    if (!q) return true;
    return (m.title||'').toLowerCase().includes(q) || (m.content||'').toLowerCase().includes(q);
  });
  if (sortBy === 'importance') fm.sort((a,b) => (b.importance||0) - (a.importance||0));

  let html = `
    <header>
      <div class="hdr-row">
        <div class="hdr-left">
          <span class="anchor">&#9875;</span>
          <div><div class="name">HAFEN</div><div class="label">MEMORY ARCHIVE</div></div>
        </div>
        <div class="hdr-right">
          <span class="badge">${memories.length} memories</span>
          <button class="refresh-btn" onclick="load()">REFRESH</button>
        </div>
      </div>
      <div class="tabs">
        <button class="tab-btn ${tab==='memories'?'active':''}" onclick="tab='memories';render()">MEMORIES</button>
        <button class="tab-btn ${tab==='profiles'?'active':''}" onclick="tab='profiles';render()">PROFILES</button>
      </div>
    </header>`;

  if (tab === 'memories') {
    html += `
      <div class="search-bar">
        <input id="search-input" value="${search}" placeholder="Search..." oninput="search=this.value;render()">
        <button class="sort-btn" onclick="sortBy=sortBy==='importance'?'time':'importance';render()">${sortBy==='importance'?'by weight':'by time'}</button>
      </div>
      <div class="count">${fm.length} ${fm.length===1?'entry':'entries'}</div>
      <div class="list">`;
    if (fm.length === 0) {
      html += `<div class="empty">${search ? 'No memories match your search.' : 'No memories yet.'}</div>`;
    }
    fm.forEach(m => {
      const imp = m.importance || 1;
      const cls = imp >= 9 ? 'high' : imp >= 7 ? 'mid' : '';
      const isOpen = selected && selected.id === m.id;
      html += `
        <div class="mem-card ${cls} ${isOpen?'active':''}" onclick="selected=${isOpen?'null':JSON.stringify(m).replace(/'/g,'&#39;').replace(/"/g,'&quot;')};renderModal()">
          <div class="mem-top">
            <div style="flex:1;min-width:0">
              <div class="mem-title">${esc(m.title||'Untitled')}</div>
              <div class="mem-preview ${isOpen?'expanded':''}">${esc(m.content||'')}</div>
              ${isOpen ? `<div class="mem-id">ID: ${m.id}</div>` : ''}
            </div>
            <div class="mem-meta">
              <span style="font-size:10px;color:#555">${timeAgo(m.created_at)}</span>
              <div class="imp-bar">${impBar(imp)}</div>
              <span class="cat-tag">${m.category||'?'}</span>
            </div>
          </div>
        </div>`;
    });
    html += `</div>`;
  } else {
    html += `<div class="list" style="padding-top:16px">`;
    if (profiles.length === 0) html += `<div class="empty">No profiles yet.</div>`;
    profiles.forEach(p => {
      html += `
        <div class="prof-card">
          <div class="prof-title">${esc(p.title||'Profile')}</div>
          <div class="prof-content">${esc(p.content||'')}</div>
        </div>`;
    });
    html += `</div>`;
  }

  html += `<div class="footer">Das Licht bleibt an.</div>`;
  $('#app').innerHTML = html;

  const si = $('#search-input');
  if (si) { si.focus(); si.selectionStart = si.selectionEnd = si.value.length; }
}

function renderModal() {
  let existing = $('#modal-overlay');
  if (existing) existing.remove();
  if (!selected) return;
  const m = typeof selected === 'string' ? JSON.parse(selected) : selected;
  selected = m;
  const el = document.createElement('div');
  el.id = 'modal-overlay';
  el.className = 'modal-bg';
  el.onclick = e => { if (e.target === el) { selected = null; el.remove(); }};
  el.innerHTML = `
    <div class="modal">
      <div class="modal-hdr">
        <div>
          <h2>${esc(m.title||'Untitled')}</h2>
          <div style="display:flex;gap:6px;margin-top:6px;align-items:center">
            <span style="font-size:10px;padding:2px 7px;border-radius:4px;background:#c4a88218;color:#c4a882">${m.category||'?'}</span>
            <div class="imp-bar">${impBar(m.importance||1)}</div>
          </div>
        </div>
        <button class="close" onclick="selected=null;$('#modal-overlay').remove()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="content">${esc(m.content||'')}</div>
        <div class="modal-footer">
          <div>
            <div class="date">${fmtDate(m.created_at)}</div>
            <div class="id">${m.id}</div>
          </div>
          <div id="del-area">
            <button class="del-btn" onclick="showDelConfirm()">Delete</button>
          </div>
        </div>
      </div>
    </div>`;
  document.body.appendChild(el);
}

function showDelConfirm() {
  $('#del-area').innerHTML = `
    <button class="del-confirm" onclick="doDelete('${selected.id}')">Confirm</button>
    <button class="del-cancel" onclick="renderModal()">Cancel</button>`;
}

async function doDelete(id) {
  try {
    await apiDel('memories', id);
    memories = memories.filter(m => m.id !== id);
    selected = null;
    $('#modal-overlay').remove();
    render();
  } catch(e) { alert('Delete failed'); }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function renderLogin() {
  $('#app').innerHTML = `
    <div class="login">
      <div class="login-box">
        <div class="anchor">&#9875;</div>
        <h1>HAFEN</h1>
        <div class="sub">MEMORY ARCHIVE</div>
        <label>SUPABASE URL</label>
        <input id="cfg-url" placeholder="https://xxx.supabase.co" value="${config.url||''}">
        <label>ANON KEY</label>
        <input id="cfg-key" type="password" placeholder="sb_publishable_..." value="${config.key||''}">
        <button onclick="connect()">ENTER</button>
        <div class="motto">Das Licht bleibt an.</div>
      </div>
    </div>`;
}

render();
</script>
</body>
</html>
